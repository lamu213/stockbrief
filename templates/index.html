<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockBrief — US Stock Research</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- ============ Step 1: Minimal input view ============ -->
        <section id="inputView" class="input-view">
            <header class="header">
                <h1 class="logo">StockBrief</h1>
                <p class="tagline">Clear research briefs for everyday investors</p>
            </header>

            <div class="search-box">
                <input type="text" id="tickerInput" placeholder="Enter a ticker (e.g. AAPL)" maxlength="10" autocomplete="off" aria-label="Stock ticker">
                <button id="generateBtn">Generate Brief</button>
            </div>

            <div class="quick-picks" role="group" aria-label="Quick pick tickers">
                <button class="quick-pick" data-ticker="AAPL">AAPL</button>
                <button class="quick-pick" data-ticker="NVDA">NVDA</button>
                <button class="quick-pick" data-ticker="TSLA">TSLA</button>
            </div>

            <div class="discover" id="discoverSection">
                <p class="discover-heading">Not sure what to search?</p>
                <form class="discover-form" id="discoverForm">
                    <input type="text" id="discoverInput" placeholder="e.g. AI chips, clean energy, Japanese stocks..." autocomplete="off" aria-label="Stock discovery topic">
                    <button type="submit" id="discoverBtn">Suggest</button>
                </form>
                <p id="discoverError" class="discover-error" role="alert"></p>
                <div class="discover-results" id="discoverResults"></div>
            </div>

            <p id="errorMsg" class="error-msg" role="alert"></p>
        </section>

        <!-- ============ Loading ============ -->
        <section id="loadingSection" class="loading-section hidden">
            <div class="spinner"></div>
            <p class="loading-text">Gathering data...</p>
        </section>

        <!-- ============ Results ============ -->
        <main id="briefContent" class="brief-content hidden">
            <button id="newSearchBtn" class="new-search" type="button">&larr; New search</button>

            <!-- Hero -->
            <section class="hero card">
                <div class="hero-top">
                    <div class="hero-id">
                        <div class="logo-wrap" id="logoWrap">
                            <img id="companyLogo" class="company-logo" alt="" />
                            <span class="logo-fallback" id="logoFallback"></span>
                        </div>
                        <div class="hero-text">
                            <h2 class="company-name" id="companyName"></h2>
                            <span class="ticker-symbol" id="tickerSymbol"></span>
                            <p class="snapshot-text" id="snapshotText"></p>
                        </div>
                    </div>
                    <div class="price-block">
                        <div class="current-price" id="currentPrice"></div>
                        <div class="price-change" id="priceChange"></div>
                    </div>
                </div>

                <div class="chart-block">
                    <div class="chart-tabs" id="chartTabs" role="tablist" aria-label="Price chart period">
                        <button class="chart-tab" data-period="1mo" type="button" role="tab">1M</button>
                        <button class="chart-tab active" data-period="3mo" type="button" role="tab" aria-selected="true">3M</button>
                        <button class="chart-tab" data-period="6mo" type="button" role="tab">6M</button>
                        <button class="chart-tab" data-period="1y" type="button" role="tab">1Y</button>
                        <button class="chart-tab" data-period="5y" type="button" role="tab">5Y</button>
                        <button class="chart-tab" data-period="max" type="button" role="tab">Max</button>
                    </div>
                    <div class="chart-wrap">
                        <canvas id="priceChart" aria-label="Historical price chart"></canvas>
                    </div>
                    <div class="chart-legend" id="chartLegend"></div>
                    <p class="chart-note" id="chartNote"></p>
                </div>
            </section>

            <!-- ============ Section 1: Five-factor scorecard (full width) ============ -->
            <section class="card scorecard-section">
                <h3 class="section-title">Five-Factor Scorecard</h3>
                <div class="scorecard-table-wrap">
                    <table class="scorecard-table">
                        <thead>
                            <tr>
                                <th scope="col">Factor</th>
                                <th scope="col">Signal</th>
                            </tr>
                        </thead>
                        <tbody id="scorecardBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- ============ Section 2: Causal separator ============ -->
            <div class="causal-separator" role="separator" aria-label="Signals feed into the snapshot below">
                <span class="separator-arrow" aria-hidden="true">&darr;</span>
                <span class="separator-text">Based on the above signals:</span>
            </div>

            <!-- ============ Section 3: One-sentence snapshot (full width) ============ -->
            <section class="snapshot-sentence-box">
                <p class="snapshot-sentence-text" id="snapshotSentence"></p>
            </section>

            <!-- ============ Section 4: Risk flags (full width) ============ -->
            <section class="risk-flags card" id="riskSection">
                <h3 class="section-title">Risk Flags</h3>
                <ul class="risk-list" id="riskList"></ul>
            </section>

            <!-- ============ News + Chat (two columns) ============ -->
            <section class="news-chat-section">
                <div class="news-chat-left">
                    <h3 class="section-title">Recent News</h3>
                    <div class="news-scroll" id="newsList"></div>
                </div>
                <div class="news-chat-right">
                    <h3 class="section-title" id="chatHeader">Ask about this stock</h3>
                    <div class="chat-messages" id="chatMessages">
                        <p class="chat-placeholder" id="chatPlaceholder"></p>
                    </div>
                    <form class="chat-form" id="chatForm">
                        <input type="text" id="chatInput" placeholder="Ask a question..." autocomplete="off" aria-label="Chat message">
                        <button type="submit" id="chatSendBtn">Send</button>
                    </form>
                </div>
            </section>

            <!-- ============ Compare two stocks ============ -->
            <section class="compare-section" id="compareSection">
                <h3 class="section-title">Compare with another stock</h3>
                <form class="compare-form" id="compareForm">
                    <input type="text" id="compareTickerInput" placeholder="Enter a second ticker (e.g. MSFT)" maxlength="10" autocomplete="off" aria-label="Second stock ticker">
                    <button type="submit" id="compareBtn">Compare</button>
                </form>
                <p id="compareError" class="compare-error" role="alert"></p>
                <div id="compareResults"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
